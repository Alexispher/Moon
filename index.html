<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lua Cinematográfica - Com Sidebar</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    canvas { width: 100vw; height: 100vh; display: block; }
    
    /* Um toquezinho de CSS para a sidebar combinar com a sua estética Dark/Tática */
    .lil-gui { 
        --background-color: rgba(15, 15, 18, 0.85);
        --text-color: #f5f5f7;
        --title-background-color: #1a1a1f;
        --widget-color: #2c2c35;
        --hover-color: #3d3d4a;
        --focus-color: #4e4e5e;
        font-family: Inter, Arial, sans-serif;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/",
        "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'lil-gui';

    const textureURL = "https://s3-us-west-2.amazonaws.com/s.cdpn.io/17271/lroc_color_poles_1k.jpg"; 
    const displacementURL = "https://s3-us-west-2.amazonaws.com/s.cdpn.io/17271/ldem_3_8bit.jpg"; 
    const worldURL = "https://s3-us-west-2.amazonaws.com/s.cdpn.io/17271/hipp8_s.jpg";

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 0.1, 1000 );
    camera.position.z = 5.2;

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize( window.innerWidth, window.innerHeight );
    renderer.setPixelRatio( Math.min(window.devicePixelRatio, 2) );
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    document.body.appendChild( renderer.domElement );

    const controls = new OrbitControls( camera, renderer.domElement );
    controls.enableDamping = true; 
    controls.dampingFactor = 0.05;
    controls.minDistance = 3.0;
    controls.maxDistance = 10.0;

    const geometry = new THREE.SphereGeometry( 2, 256, 256 );
    const textureLoader = new THREE.TextureLoader();
    
    const albedo = textureLoader.load( textureURL );
    albedo.colorSpace = THREE.SRGBColorSpace;
    albedo.anisotropy = renderer.capabilities.getMaxAnisotropy();

    const displacementMap = textureLoader.load( displacementURL );
    const worldTexture = textureLoader.load( worldURL );
    worldTexture.colorSpace = THREE.SRGBColorSpace;

    const material = new THREE.MeshStandardMaterial({ 
      color: 0xffffff,
      map: albedo,
      displacementMap: displacementMap,
      displacementScale: 0.05,
      bumpMap: displacementMap,
      bumpScale: 0.015,         
      roughness: 0.98,
      metalness: 0.0
    });

    const moon = new THREE.Mesh( geometry, material );
    scene.add( moon );

    const sunLight = new THREE.DirectionalLight(0xFFFFFF, 4.0); 
    sunLight.position.set(-90, 12, -15); 
    scene.add(sunLight);

    const earthShine = new THREE.AmbientLight(0xffffff, 0.012); 
    scene.add(earthShine);

    const worldGeometry = new THREE.SphereGeometry( 500, 64, 64 );
    const worldMaterial = new THREE.MeshBasicMaterial({ 
      color: 0x444444, 
      map: worldTexture, 
      side: THREE.BackSide
    });
    const world = new THREE.Mesh( worldGeometry, worldMaterial );
    scene.add( world );

    // Centralizando levemente à esquerda
    moon.position.set(-0.8, 0, 0); 
    controls.target.set(-0.8, 0, 0);
    moon.rotation.x = 3.1415 * 0.02;
    moon.rotation.y = 3.1415 * 1.54;

    // --- A MÁGICA ACONTECE AQUI: A SIDEBAR (LIL-GUI) ---
    const gui = new GUI({ title: 'Controle da Lente' });
    
    // Objeto que guarda os valores atuais
    const params = {
      exposure: 1.15,
      sunIntensity: 4.0,
      sunX: -90,
      sunY: 12,
      sunZ: -15,
      bumpScale: 0.015,
      displacement: 0.05,
      roughness: 0.98,
      autoRotate: true,
      rotateSpeed: 0.0003
    };

    // Pasta de Iluminação e Câmera
    const folderLight = gui.addFolder('Iluminação Solar');
    folderLight.add(params, 'exposure', 0.1, 3.0).name('Exposição').onChange(v => renderer.toneMappingExposure = v);
    folderLight.add(params, 'sunIntensity', 0, 10).name('Intensidade').onChange(v => sunLight.intensity = v);
    folderLight.add(params, 'sunX', -150, 150).name('Eixo X (Sombra)').onChange(v => sunLight.position.x = v);
    folderLight.add(params, 'sunY', -150, 150).name('Eixo Y (Altura)').onChange(v => sunLight.position.y = v);
    folderLight.add(params, 'sunZ', -150, 150).name('Eixo Z (Frente/Trás)').onChange(v => sunLight.position.z = v);

    // Pasta de Detalhes da Superfície
    const folderMaterial = gui.addFolder('Superfície Lunar');
    folderMaterial.add(params, 'displacement', 0, 0.2).name('Profundidade 3D').onChange(v => material.displacementScale = v);
    folderMaterial.add(params, 'bumpScale', 0, 0.1).name('Micro-Crateras').onChange(v => material.bumpScale = v);
    folderMaterial.add(params, 'roughness', 0, 1).name('Fosco/Brilho').onChange(v => material.roughness = v);

    // Pasta de Rotação
    const folderAnim = gui.addFolder('Animação');
    folderAnim.add(params, 'autoRotate').name('Girar Sozinha');
    folderAnim.add(params, 'rotateSpeed', 0, 0.01).name('Velocidade');

    // Loop
    function animate() {
      requestAnimationFrame( animate );
      controls.update(); 
      
      if (params.autoRotate) {
        moon.rotation.y += params.rotateSpeed; 
        world.rotation.y += (params.rotateSpeed / 3);
      }
      
      renderer.render( scene, camera );
    }
    animate();

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize, false);
  </script>
</body>
</html>
