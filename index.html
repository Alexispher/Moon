<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISOMIUM Moon Realistic v5</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main id="app">
    <canvas id="space-canvas"></canvas>
    <div id="flash"></div>

    <section id="hud" class="glass-panel">
      <div class="hud-header">
        <div>
          <h1>ISOMIUM</h1>
          <p>Moon Realistic Engine v5</p>
        </div>
        <div class="hud-actions-mini">
          <button id="btn-toggle-controls" title="Abrir controles">CTRL</button>
          <button id="btn-toggle-json" title="Abrir JSON">JSON</button>
        </div>
      </div>

      <div class="hud-grid">
        <button id="btn-preset-real">Realista</button>
        <button id="btn-preset-crescent">Crescente</button>
        <button id="btn-preset-wallpaper">Wallpaper</button>
        <button id="btn-reset-camera">Câmera</button>
        <button id="btn-export-4k">Exportar 4K</button>
        <button id="btn-export-square">4096²</button>
      </div>

      <div class="hud-info">
        <span>Mouse: orbitar</span>
        <span>Scroll: zoom</span>
        <span>H: ocultar UI</span>
        <span>C: controles</span>
        <span>J: JSON</span>
      </div>
    </section>

    <section id="controls-panel" class="glass-panel">
      <div class="panel-header">
        <div>
          <h2>Controles da Lua</h2>
          <p>Ajuste e veja o resultado em tempo real.</p>
        </div>
        <button id="btn-close-controls">×</button>
      </div>
      <div id="controls-content"></div>
    </section>

    <section id="json-panel" class="glass-panel">
      <div class="panel-header">
        <div>
          <h2>Configurações JSON</h2>
          <p>Cole um JSON completo ou parcial e clique em aplicar.</p>
        </div>
        <button id="btn-close-json">×</button>
      </div>

      <textarea id="json-input" spellcheck="false"></textarea>

      <div class="json-actions">
        <button id="btn-apply-json">Aplicar JSON</button>
        <button id="btn-export-json">Atualizar texto</button>
        <button id="btn-copy-json">Copiar</button>
        <button id="btn-download-json">Baixar JSON</button>
      </div>

      <div class="json-actions second-row">
        <label class="file-label">
          Importar arquivo
          <input id="json-file" type="file" accept="application/json,.json" />
        </label>
        <button id="btn-capture-free">Captura livre</button>
      </div>

      <p id="json-status"></p>
    </section>

    <section id="capture-status">Renderizando captura...</section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
