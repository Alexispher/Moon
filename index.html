<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISOMIUM Moon Realistic</title>
  <link rel="stylesheet" href="style.css" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main id="app">
    <canvas id="space-canvas" aria-label="Renderização 3D realista da Lua"></canvas>
    <div id="flash"></div>
    <div id="film-overlay"></div>

    <div id="phone-preview" data-label="iPhone 17 Pro Max • 1320 × 2868">
      <div class="dynamic-island"></div>
    </div>

    <section id="hud" class="glass-panel">
      <div class="hud-header">
        <div>
          <h1>ISOMIUM</h1>
          <p>Moon Realistic Engine • v3</p>
        </div>
        <button id="btn-toggle-ui" title="Ocultar interface">UI</button>
      </div>

      <div class="hud-grid">
        <button id="btn-export-4k">Exportar 4K</button>
        <button id="btn-export-vertical">4K Vertical</button>
        <button id="btn-export-square">4096²</button>
        <button id="btn-export-iphone">iPhone 17 PM</button>
        <button id="btn-export-free">Livre</button>
        <button id="btn-json">JSON</button>
      </div>

      <div class="hud-info">
        <span>Mouse: orbitar</span>
        <span>Scroll: zoom</span>
        <span>H: ocultar UI</span>
        <span>P: capturar 4K</span>
      </div>
    </section>

    <aside id="json-panel" class="glass-panel open" aria-label="Painel de configurações JSON">
      <div class="json-head">
        <div>
          <strong>Configurações JSON</strong>
          <small>Cole um JSON completo ou parcial e clique em Aplicar.</small>
        </div>
        <button id="btn-close-json" title="Fechar painel">×</button>
      </div>

      <textarea id="json-input" spellcheck="false"></textarea>

      <div class="json-actions">
        <button id="btn-apply-json">Aplicar JSON</button>
        <button id="btn-export-json">Gerar JSON atual</button>
        <button id="btn-copy-json">Copiar</button>
        <button id="btn-download-json">Baixar .json</button>
        <label class="file-button">
          Importar .json
          <input id="json-file" type="file" accept="application/json,.json" />
        </label>
      </div>

      <div class="preset-actions">
        <button data-preset="realista">Realista</button>
        <button data-preset="cinematico">Cinemático</button>
        <button data-preset="apollo">Apollo P&B</button>
        <button data-preset="iphone">iPhone</button>
      </div>

      <p id="json-status">Pronto.</p>
    </aside>

    <section id="capture-status" class="capture-status">Renderizando captura...</section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
