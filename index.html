<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulação Cinematográfica - Lua, Terra e Sol</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    canvas { width: 100vw; height: 100vh; display: block; }
    
    /* Estética Dark/Tática para a Interface */
    .lil-gui { 
        --background-color: rgba(12, 12, 14, 0.85);
        --text-color: #f5f5f7;
        --title-background-color: #16161a;
        --widget-color: #2a2a32;
        --hover-color: #383842;
        --focus-color: #4a4a55;
        font-family: Inter, Arial, sans-serif;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/",
        "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'lil-gui';

    // ==========================================
    // 1. CONFIGURAÇÃO BASE (Câmera Cinematográfica)
    // ==========================================
    const scene = new THREE.Scene();
    
    // FOV 35 simula uma lente de 50mm (padrão do olho humano/cinema)
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 20000);
    camera.position.set(0, 1.5, 6.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; 
    controls.dampingFactor = 0.05;
    controls.minDistance = 2.5;
    controls.maxDistance = 20.0;

    const textureLoader = new THREE.TextureLoader();

    // ==========================================
    // 2. A LUA (O Ponto de Vista - Escala Base: Raio 2)
    // ==========================================
    const moonGeo = new THREE.SphereGeometry(2, 256, 256);
    const moonColor = textureLoader.load("https://s3-us-west-2.amazonaws.com/s.cdpn.io/17271/lroc_color_poles_1k.jpg");
    moonColor.colorSpace = THREE.SRGBColorSpace;
    const moonDisp = textureLoader.load("https://s3-us-west-2.amazonaws.com/s.cdpn.io/17271/ldem_3_8bit.jpg");

    const moonMat = new THREE.MeshStandardMaterial({ 
      map: moonColor,
      displacementMap: moonDisp,
      displacementScale: 0.05,
      bumpMap: moonDisp,
      bumpScale: 0.015,         
      roughness: 0.98, // Regolito fosco
      metalness: 0.0
    });
    const moon = new THREE.Mesh(moonGeo, moonMat);
    moon.rotation.y = Math.PI * 1.54;
    scene.add(moon);

    // ==========================================
    // 3. A TERRA (Proporções Físicas)
    // Escala Real: Raio da Terra é ~3.67x a Lua. (2 * 3.67 = 7.34)
    // ==========================================
    const earthGroup = new THREE.Group();
    
    const earthGeo = new THREE.SphereGeometry(7.34, 128, 128);
    const earthBaseColor = textureLoader.load("https://s3-us-west-2.amazonaws.com/s.cdpn.io/123879/ColorMap.jpg");
    earthBaseColor.colorSpace = THREE.SRGBColorSpace;
    const earthSpec = textureLoader.load("https://s3-us-west-2.amazonaws.com/s.cdpn.io/123879/SpecMask.jpg");
    const earthBump = textureLoader.load("https://s3-us-west-2.amazonaws.com/s.cdpn.io/123879/Bump.jpg");

    const earthMat = new THREE.MeshStandardMaterial({
      map: earthBaseColor,
      roughness: 0.6, // Oceanos refletem, terra não
      metalness: 0.1,
      roughnessMap: earthSpec,
      bumpMap: earthBump,
      bumpScale: 0.02
    });
    const earth = new THREE.Mesh(earthGeo, earthMat);
    earthGroup.add(earth);

    // Nuvens da Terra
    const cloudGeo = new THREE.SphereGeometry(7.34 + 0.05, 128, 128);
    const cloudAlpha = textureLoader.load("https://s3-us-west-2.amazonaws.com/s.cdpn.io/123879/alphaMap.jpg");
    const cloudMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      alphaMap: cloudAlpha,
      transparent: true,
      depthWrite: false,
      roughness: 0.9,
      blending: THREE.NormalBlending
    });
    const clouds = new THREE.Mesh(cloudGeo, cloudMat);
    earthGroup.add(clouds);

    // Posicionamento base da Terra (Ao fundo)
    earthGroup.position.set(-60, 15, -150);
    scene.add(earthGroup);

    // ==========================================
    // 4. O SOL E A ILUMINAÇÃO (O Vácuo Sombrio)
    // ==========================================
    // Luz Direcional (Raios paralelos simulando o Sol distante)
    const sunLight = new THREE.DirectionalLight(0xffffff, 4.5); 
    sunLight.position.set(500, 50, -200); 
    scene.add(sunLight);

    // Representação Visual do Sol (Disco estourado de luz)
    const sunSpriteMat = new THREE.SpriteMaterial({
      map: textureLoader.load('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123879/glow.png'),
      color: 0xffffee,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const sunVisual = new THREE.Sprite(sunSpriteMat);
    sunVisual.scale.set(150, 150, 1);
    sunVisual.position.copy(sunLight.position);
    scene.add(sunVisual);

    // Earthshine: A Terra reflete uma leve luz azulada na parte escura da Lua
    const earthShine = new THREE.AmbientLight(0x224488, 0.015); 
    scene.add(earthShine);

    // ==========================================
    // 5. O CÉU ESTRELADO (Realista: Pontos brancos distantes)
    // ==========================================
    const starCount = 3000;
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(starCount * 3);
    for(let i = 0; i < starCount * 3; i++) {
      starPos[i] = (Math.random() - 0.5) * 2000; 
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.8, sizeAttenuation: true });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // ==========================================
    // 6. INTERFACE DE CONTROLE (LIL-GUI)
    // ==========================================
    const gui = new GUI({ title: 'Painel Tático ISOMIUM' });
    
    const params = {
      showEarth: true,
      showSun: true,
      sunX: 500,
      sunY: 50,
      sunZ: -200,
      cinematicScale: false, // Cheat de escala para Wallpaper
      exposure: 1.15
    };

    // Pasta Visibilidade
    const fVis = gui.addFolder('Visibilidade dos Astros');
    fVis.add(params, 'showEarth').name('Mostrar Terra').onChange(v => earthGroup.visible = v);
    fVis.add(params, 'showSun').name('Mostrar Sol (Luz)').onChange(v => {
      sunLight.intensity = v ? 4.5 : 0;
      sunVisual.visible = v;
      // Se o Sol apaga, o painel reduz a exposição para não estourar com o Earthshine
      if(!v) renderer.toneMappingExposure = 0.5;
      else renderer.toneMappingExposure = params.exposure;
    });

    // Pasta Sistema Solar (Escala e Iluminação)
    const fSys = gui.addFolder('Física e Escala');
    fSys.add(params, 'cinematicScale').name('Escala Cinematográfica').onChange(v => {
      // Se verdadeiro, traz a Terra para mais perto e a aumenta (Efeito Scifi)
      // Se falso, mantém a distância respeitando as proporções matemáticas
      if(v) {
        earthGroup.position.set(-25, 5, -50);
        earthGroup.scale.set(1.5, 1.5, 1.5);
      } else {
        earthGroup.position.set(-60, 15, -150);
        earthGroup.scale.set(1, 1, 1);
      }
    });
    fSys.add(params, 'exposure', 0.1, 3.0).name('Exposição da Lente').onChange(v => {
      if(params.showSun) renderer.toneMappingExposure = v;
    });

    // Pasta Posição do Sol
    const fSun = gui.addFolder('Posição do Sol (Sombras)');
    const updateSunPos = () => {
      sunLight.position.set(params.sunX, params.sunY, params.sunZ);
      sunVisual.position.copy(sunLight.position);
    };
    fSun.add(params, 'sunX', -800, 800).name('Eixo X').onChange(updateSunPos);
    fSun.add(params, 'sunY', -200, 800).name('Altura (Y)').onChange(updateSunPos);
    fSun.add(params, 'sunZ', -800, 800).name('Profundidade (Z)').onChange(updateSunPos);

    // ==========================================
    // 7. MOTOR DE RENDERIZAÇÃO
    // ==========================================
    function animate() {
      requestAnimationFrame(animate);
      controls.update(); 
      
      // Rotação sutil da Terra e das Nuvens
      earth.rotation.y += 0.0005;
      clouds.rotation.y += 0.0007; // Nuvens se movem um pouco mais rápido
      
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
